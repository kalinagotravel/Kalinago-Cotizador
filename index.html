<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Generador de Cotizaciones · Kalinago Travel</title>
<style>
  :root{
    --amber:#F9A436;
    --indigo:#3E4095;
    --cream:#FFF6E5;
    --green:#0FA968;
    --red:#E23B3B;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#e9e9ee;color:#222;}
  .app{display:flex;min-height:100vh;}
  .form-panel{width:400px;flex-shrink:0;background:#fff;padding:20px;overflow-y:auto;height:100vh;position:sticky;top:0;border-right:1px solid #ddd;}
  .preview-wrap{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;align-items:center;gap:16px;}
  h2.section{font-size:14px;color:var(--indigo);text-transform:uppercase;letter-spacing:.5px;margin:22px 0 8px;border-bottom:2px solid var(--amber);padding-bottom:4px;}
  label{display:block;font-size:12px;font-weight:bold;margin:8px 0 3px;color:#333;}
  input[type=text],input[type=number],textarea{width:100%;padding:6px 8px;border:1px solid #ccc;border-radius:4px;font-size:13px;font-family:inherit;}
  textarea{resize:vertical;min-height:44px;}
  .row2{display:flex;gap:8px;}
  .row2>div{flex:1;}
  button{cursor:pointer;border:none;border-radius:5px;font-size:12px;font-weight:bold;padding:7px 10px;}
  .btn-primary{background:var(--indigo);color:#fff;}
  .btn-add{background:var(--amber);color:#3E4095;width:100%;margin-top:6px;}
  .btn-del{background:#eee;color:#a00;padding:4px 8px;}
  .day-card{border:1px solid #ddd;border-radius:6px;padding:10px;margin-bottom:10px;background:#fafafa;}
  .day-card-head{display:flex;justify-content:space-between;align-items:center;}
  .toolbar{position:sticky;top:0;background:#fff;padding:10px 0 16px;z-index:5;display:flex;gap:8px;align-items:center;}
  .toolbar span{font-size:11px;color:#666;}
  .import-box{border:2px dashed var(--indigo);border-radius:6px;padding:10px;margin-bottom:14px;background:#f7f7fc;}
  .import-box label{margin-top:0;}
  .import-actions{display:flex;gap:6px;margin-top:6px;}
  .import-actions button{flex:1;}
  .import-msg{font-size:11px;margin-top:6px;min-height:14px;}
  .list-item{display:flex;gap:6px;margin-bottom:4px;}
  .list-item input{flex:1;}

  /* ---- PDF PAGE STYLES ---- */
  .page{width:794px;min-height:1123px;background:var(--amber);position:relative;box-shadow:0 2px 10px rgba(0,0,0,.2);overflow:visible;font-family:Arial,Helvetica,sans-serif;}
  .page-content{padding:40px 45px 90px;position:relative;z-index:1;}
  .watermark{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:65%;max-width:520px;opacity:0.15;z-index:0;pointer-events:none;}
  .footer-bar{position:absolute;bottom:0;left:0;right:0;background:var(--indigo);color:#fff;font-size:11px;padding:10px 45px;display:flex;justify-content:space-between;align-items:flex-end;z-index:1;}
  .footer-bar .right-block{text-align:right;}
  .footer-bar .page-num{font-size:10px;opacity:.8;margin-top:2px;}
  .footer-bar b{color:var(--amber);}
  .top-header{background:var(--indigo);color:#fff;padding:16px 45px;display:flex;align-items:center;gap:12px;}
  .top-header .logo-mini{width:44px;height:44px;border-radius:50%;object-fit:cover;flex-shrink:0;}
  .top-header .brand{font-weight:bold;font-size:16px;letter-spacing:1px;}
  .top-header .sub{font-size:10px;opacity:.85;}
  .top-header .right{margin-left:auto;font-size:12px;font-weight:bold;}

  .cover-logo{width:180px;height:180px;border-radius:50%;margin:20px auto 10px;display:block;object-fit:cover;}
  .cover-title{text-align:center;color:var(--indigo);font-size:32px;font-weight:900;margin:6px 0 2px;}
  .cover-sub{text-align:center;font-size:14px;margin-bottom:14px;}
  .cover-badge{background:var(--indigo);color:var(--amber);text-align:center;font-weight:bold;padding:10px;border-radius:6px;margin:0 auto 16px;width:80%;font-size:15px;}
  .cover-img{width:100%;height:340px;object-fit:cover;border-radius:8px;margin-bottom:16px;background:#ddd;}
  .prep-box{background:var(--cream);border-radius:8px;padding:14px 18px;font-size:13px;}
  .prep-box .name{font-size:20px;font-weight:bold;color:var(--indigo);margin:4px 0;}
  .prep-box .valid{color:var(--indigo);font-style:italic;font-size:12px;margin-top:4px;}

  .day-tagbar{display:flex;gap:8px;margin-bottom:10px;}
  .tag{padding:5px 12px;border-radius:14px;font-size:11px;font-weight:bold;color:#fff;}
  .tag.day{background:var(--indigo);}
  .tag.cat{background:#E2643B;}
  .day-title{color:var(--indigo);font-size:24px;font-weight:900;margin:4px 0 2px;}
  .day-subtitle{font-style:italic;font-size:13px;margin-bottom:14px;}
  .day-grid{display:flex;gap:20px;}
  .day-img{width:44%;height:260px;object-fit:cover;border-radius:8px;background:#ddd;}
  .day-includes{flex:1;}
  .day-includes b{color:var(--indigo);font-size:14px;}
  .day-includes ul{padding-left:18px;margin:6px 0;font-size:12px;line-height:1.5;}
  .not-includes{color:var(--red);font-weight:bold;font-size:12px;margin-top:14px;}
  .tip-box{background:var(--cream);border-radius:8px;padding:12px 16px;margin-top:16px;font-size:12px;}
  .tip-box b{color:var(--indigo);}

  table.inv{width:100%;border-collapse:collapse;margin:14px 0;font-size:12px;}
  table.inv th{background:var(--indigo);color:var(--amber);text-align:left;padding:8px;}
  table.inv td{padding:8px;border-bottom:1px solid #ffdca0;background:rgba(255,255,255,.35);}
  table.inv tr.total td{background:var(--indigo);color:var(--amber);font-weight:bold;}
  .extra-cost{color:#7a2b00;font-weight:bold;font-size:12px;margin:8px 0;}
  .pay-box{background:var(--indigo);color:#fff;border-radius:8px;padding:14px 18px;font-size:12px;margin:14px 0;}
  .pay-box b{color:var(--amber);display:block;margin-bottom:6px;font-size:13px;}
  .gift-box{background:var(--green);color:#fff;border-radius:8px;padding:12px 18px;font-size:12px;margin-bottom:14px;}
  .gift-box b{display:block;margin-bottom:4px;}
  .deadline-banner{background:var(--red);color:#fff;text-align:center;font-weight:bold;padding:10px;border-radius:6px;margin-bottom:14px;font-size:13px;}
  .legal{font-size:9px;color:#5a3b00;line-height:1.4;}
  .inv-badge{background:var(--indigo);color:var(--amber);display:inline-block;padding:5px 12px;border-radius:14px;font-size:11px;font-weight:bold;margin-bottom:10px;}
  .inv-h{color:var(--indigo);font-size:26px;font-weight:900;margin:6px 0 2px;}

  *{ -webkit-print-color-adjust:exact !important; print-color-adjust:exact !important; color-adjust:exact !important; }

  @media print{
    body{background:#fff;}
    .form-panel,.toolbar{display:none !important;}
    .preview-wrap{padding:0;gap:0;}
    .page{box-shadow:none;page-break-after:always;}
    @page{size:A4;margin:0;}
  }
</style>
</head>
<body>
<div class="app">

  <!-- ================= FORM PANEL ================= -->
  <div class="form-panel">
    <div class="toolbar">
      <button class="btn-primary" onclick="window.print()">⬇️ Descargar PDF</button>
      <span>Se abre el diálogo de impresión → "Guardar como PDF"</span>
    </div>

    <!-- ===== IMPORTACIÓN AUTOMÁTICA ===== -->
    <div class="import-box">
      <label>Importar datos (JSON generado en el chat)</label>
      <textarea id="importJson" rows="6" placeholder='Pega aquí el JSON y presiona "Cargar"'></textarea>
      <div class="import-actions">
        <button class="btn-primary" onclick="importarJSON()">Cargar</button>
        <button class="btn-primary" style="background:#777;" onclick="exportarJSON()">Copiar JSON actual</button>
      </div>
      <div class="import-msg" id="importMsg"></div>
    </div>

    <h2 class="section">Datos generales</h2>
    <label>Campaña / referencia (footer)</label>
    <input type="text" id="campaign" value="Cartagena Summer 2026">
    <label>Título propuesta</label>
    <input type="text" id="coverTitle" value="PROPUESTA DE VIAJE">
    <label>Subtítulo</label>
    <input type="text" id="coverSub" value="Experiencia privada · Cartagena de Indias">
    <label>Badge duración/fechas</label>
    <input type="text" id="coverBadge" value="" placeholder="Ej. 3 DÍAS · 01-03 AGOSTO 2026">
    <label>URL foto de portada</label>
    <input type="text" id="coverImg" placeholder="https://... o img/portada.jpg">

    <h2 class="section">Cliente</h2>
    <label>Nombre</label>
    <input type="text" id="clientName" value="" placeholder="Nombre del cliente">
    <div class="row2">
      <div><label>N° pasajeros / tipo</label><input type="text" id="pax" value="" placeholder="Ej. 2 pasajeros (pareja)"></div>
      <div><label>Origen</label><input type="text" id="origin" value="" placeholder="Ciudad de origen"></div>
    </div>
    <label>Rango de fechas</label>
    <input type="text" id="dateRange" value="" placeholder="Ej. 01 al 03 de agosto de 2026">
    <label>Válida hasta (incluir hora)</label>
    <input type="text" id="validUntil" value="" placeholder="Ej. 28 de julio de 2026, 6:00 p.m.">
    <label>Fecha de emisión</label>
    <input type="text" id="issueDate" value="" placeholder="Ej. 15 de julio de 2026">

    <h2 class="section">Días / actividades</h2>
    <div id="daysContainer"></div>
    <button class="btn-add" onclick="addDay()">+ Agregar día</button>

    <h2 class="section">Inversión</h2>
    <label># pasajeros a cobrar (multiplica precio/persona)</label>
    <input type="number" id="paxCount" value="2" onchange="render()">
    <label>Costos extra (ej. impuesto de muelle) — uno por línea</label>
    <textarea id="extraCosts" placeholder="Ej. + Impuesto de muelle: $18.000 x pax (se paga en el muelle)"></textarea>

    <label>Forma de pago</label>
    <textarea id="payTerms">Depósito del 50% al momento de confirmar la reserva.
La reserva queda en firme únicamente al recibir ese depósito.
Saldo restante en efectivo a la llegada.</textarea>

    <label>Regalo de bienvenida (dejar vacío para ocultar)</label>
    <textarea id="giftText">Traslado aeropuerto → hotel SIN COSTO al confirmar la reserva con el 50% de depósito.</textarea>

    <label>Banner de cierre / cupo</label>
    <input type="text" id="deadlineText" value="Cupo sujeto a disponibilidad · Reserva antes del [FECHA]">

    <label>Texto legal (footer inversión)</label>
    <textarea id="legalText" style="min-height:110px;">Tarifas no reembolsables. El no presentarse en la fecha y hora indicada genera no show con cobro del 100%. Kalinago Travel se reserva el derecho de cambiar operador o transporte por otro de igual o mejor categoría. Los paseos náuticos dependen de condiciones climáticas. Tarifas sujetas a cambios sin previo aviso. Aplican términos y condiciones de kalinagotravel.com. Prestador de servicios turísticos inscrito en el RNT 131954 (Ley 300 de 1996). Kalinago Travel rechaza la explotación y el abuso sexual comercial de niños, niñas y adolescentes; esta conducta es sancionada penal y administrativamente conforme a las Leyes 679 de 2001 y 1336 de 2009.</textarea>
  </div>

  <!-- ================= PREVIEW ================= -->
  <div class="preview-wrap" id="preview"></div>
</div>

<!-- El logo en base64 vive en su propio archivo para no ensuciar este -->
<script src="logo.js"></script>

<script>
let days = [
  {dayNumber:1, dateLabel:"", category:"", title:"Nombre de la actividad",
   subtitle:"", img:"",
   includes:"",
   notIncludes:"", tip:"",
   price:0, priceLabel:"Nombre de la actividad"}
];

function addDay(){
  days.push({dayNumber:days.length+1, dateLabel:"", category:"", title:"Nueva actividad",
    subtitle:"", img:"", includes:"", notIncludes:"", tip:"", price:0, priceLabel:"Nueva actividad"});
  renumerar(); renderForm(); render();
}
function delDay(i){ days.splice(i,1); renumerar(); renderForm(); render(); }
function renumerar(){ days.forEach((d,i)=>{ d.dayNumber = i+1; }); }

function renderForm(){
  const c = document.getElementById('daysContainer');
  c.innerHTML = days.map((d,i)=>`
    <div class="day-card">
      <div class="day-card-head"><b>Día ${i+1}</b><button class="btn-del" onclick="delDay(${i})">✕</button></div>
      <label>Fecha corta (ej. SÁB 02 AGO)</label>
      <input type="text" value="${esc(d.dateLabel)}" oninput="days[${i}].dateLabel=this.value;render()">
      <label>Categoría / tag</label>
      <input type="text" value="${esc(d.category)}" oninput="days[${i}].category=this.value;render()">
      <label>Título</label>
      <input type="text" value="${esc(d.title)}" oninput="days[${i}].title=this.value;render()">
      <label>Subtítulo</label>
      <input type="text" value="${esc(d.subtitle)}" oninput="days[${i}].subtitle=this.value;render()">
      <label>URL foto</label>
      <input type="text" value="${esc(d.img)}" oninput="days[${i}].img=this.value;render()">
      <label>Incluye (una línea por ítem)</label>
      <textarea oninput="days[${i}].includes=this.value;render()">${esc(d.includes)}</textarea>
      <label>No incluye (opcional)</label>
      <input type="text" value="${esc(d.notIncludes)}" oninput="days[${i}].notIncludes=this.value;render()">
      <label>Nota / recomendación (opcional)</label>
      <textarea oninput="days[${i}].tip=this.value;render()">${esc(d.tip)}</textarea>
      <label>Concepto en tabla de inversión</label>
      <input type="text" value="${esc(d.priceLabel)}" oninput="days[${i}].priceLabel=this.value;render()">
      <label>Precio por persona (COP)</label>
      <input type="number" value="${d.price}" oninput="days[${i}].price=Number(this.value);render()">
    </div>
  `).join('');
}

/* Escapado completo: antes solo cubría comillas y se rompía con & o < */
function esc(s){
  return String(s==null?'':s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}
function money(n){ return '$' + Number(n||0).toLocaleString('es-CO'); }
function nl2ul(text){
  return String(text||'').split('\n').filter(l=>l.trim()).map(l=>`<li>${esc(l)}</li>`).join('');
}
function nl2br(text){ return esc(text).replace(/\n/g,'<br>'); }

function render(){
  const g = id => document.getElementById(id).value;
  const campaign = g('campaign');
  const pax = Number(g('paxCount'))||1;

  let coverImgHtml = g('coverImg')
    ? `<img class="cover-img" src="${esc(g('coverImg'))}">`
    : `<div class="cover-img" style="display:flex;align-items:center;justify-content:center;color:#7a5c1a;font-size:12px;">[ foto de portada ]</div>`;

  let pagesHtml = '';
  const totalPages = 1 + days.length + 1; // portada + días + inversión
  let pageCounter = 1;

  // ---- PORTADA ----
  pagesHtml += `
  <div class="page">
    <img class="watermark" src="${LOGO_DATA_URI}">
    <div class="page-content">
      <img class="cover-logo" src="${LOGO_DATA_URI}">
      <div class="cover-title">${esc(g('coverTitle'))}</div>
      <div class="cover-sub" style="color:#3E4095;">${esc(g('coverSub'))}</div>
      <div class="cover-badge">${esc(g('coverBadge'))}</div>
      ${coverImgHtml}
      <div class="prep-box">
        Preparado para:
        <div class="name">${esc(g('clientName'))}</div>
        ${esc(g('pax'))} · Origen: ${esc(g('origin'))} · ${esc(g('dateRange'))}
        <div class="valid">Propuesta válida hasta el ${esc(g('validUntil'))}</div>
        ${g('issueDate') ? `<div class="valid">Fecha de emisión: ${esc(g('issueDate'))}</div>` : ''}
      </div>
    </div>
    <div class="footer-bar">
      <span>Kalinago Travel · Cartagena de Indias, Colombia · WhatsApp Business</span>
      <span class="right-block"><b>${esc(campaign)}</b> · Portada<div class="page-num">Page ${pageCounter} / ${totalPages}</div></span>
    </div>
  </div>`;
  pageCounter++;

  // ---- DAYS ----
  days.forEach((d,i)=>{
    let imgHtml = d.img
      ? `<img class="day-img" src="${esc(d.img)}">`
      : `<div class="day-img" style="display:flex;align-items:center;justify-content:center;color:#7a5c1a;font-size:11px;">[ foto ]</div>`;
    pagesHtml += `
    <div class="page">
      <img class="watermark" src="${LOGO_DATA_URI}">
      <div class="top-header">
        <img class="logo-mini" src="${LOGO_DATA_URI}">
        <div><div class="brand">KALINAGO TRAVEL</div><div class="sub">Cartagena de Indias · RNT 131954</div></div>
        <div class="right">Día ${String(d.dayNumber).padStart(2,'0')}</div>
      </div>
      <div class="page-content">
        <div class="day-tagbar">
          <span class="tag day">DÍA ${String(d.dayNumber).padStart(2,'0')} · ${esc(d.dateLabel)}</span>
          ${d.category ? `<span class="tag cat">${esc(d.category)}</span>` : ''}
        </div>
        <div class="day-title">${esc(d.title)}</div>
        <div class="day-subtitle">${esc(d.subtitle)}</div>
        <div class="day-grid">
          ${imgHtml}
          <div class="day-includes">
            <b>Incluye</b>
            <ul>${nl2ul(d.includes)}</ul>
          </div>
        </div>
        ${d.notIncludes ? `<div class="not-includes">${esc(d.notIncludes)}</div>` : ''}
        ${d.tip ? `<div class="tip-box">${nl2br(d.tip)}</div>` : ''}
      </div>
      <div class="footer-bar">
        <span>Kalinago Travel · Cartagena de Indias, Colombia · WhatsApp Business</span>
        <span class="right-block"><b>${esc(campaign)}</b> · Día ${String(d.dayNumber).padStart(2,'0')}<div class="page-num">Page ${pageCounter} / ${totalPages}</div></span>
      </div>
    </div>`;
    pageCounter++;
  });

  // ---- INVERSIÓN ----
  const rows = days.map(d=>{
    const subtotal = d.price*pax;
    return `<tr><td>${esc(d.priceLabel)}</td><td>${money(d.price)}</td><td><b>${money(subtotal)}</b></td></tr>`;
  }).join('');
  const total = days.reduce((s,d)=>s+d.price*pax,0);
  const deposit = Math.round(total/2);

  pagesHtml += `
  <div class="page">
    <img class="watermark" src="${LOGO_DATA_URI}">
    <div class="top-header">
      <img class="logo-mini" src="${LOGO_DATA_URI}">
      <div><div class="brand">KALINAGO TRAVEL</div><div class="sub">Cartagena de Indias · RNT 131954</div></div>
      <div class="right">Inversión</div>
    </div>
    <div class="page-content">
      <div class="inv-badge">INVERSIÓN Y CONDICIONES</div>
      <div class="inv-h">Resumen de inversión</div>
      <div style="font-size:12px;">Valores para ${pax} pasajero(s). Moneda: pesos colombianos (COP).</div>
      <table class="inv">
        <tr><th>CONCEPTO</th><th>P / PERSONA</th><th>SUBTOTAL (${pax} PAX)</th></tr>
        ${rows}
        <tr class="total"><td>TOTAL SERVICIOS (${pax} PAX)</td><td></td><td>${money(total)}</td></tr>
      </table>
      ${g('extraCosts') ? `<div class="extra-cost">${nl2br(g('extraCosts'))}</div>` : ''}
      <div class="pay-box">
        <b>Forma de pago</b>
        ${nl2br(g('payTerms'))}<br>
        Depósito estimado (50%): ${money(deposit)} · Saldo: ${money(total-deposit)}
      </div>
      ${g('giftText') ? `<div class="gift-box"><b>Regalo de bienvenida</b>${nl2br(g('giftText'))}</div>` : ''}
      <div class="deadline-banner">${esc(g('deadlineText'))}</div>
      <div class="legal">${esc(g('legalText'))}</div>
    </div>
    <div class="footer-bar">
      <span>Kalinago Travel · Cartagena de Indias, Colombia · WhatsApp Business</span>
      <span class="right-block"><b>${esc(campaign)}</b> · Inversión<div class="page-num">Page ${pageCounter} / ${totalPages}</div></span>
    </div>
  </div>`;

  document.getElementById('preview').innerHTML = pagesHtml;
}

/* ================= CARGA / EXPORTACIÓN AUTOMÁTICA ================= */
const CAMPOS = ['campaign','coverTitle','coverSub','coverBadge','coverImg',
  'clientName','pax','origin','dateRange','validUntil','issueDate',
  'paxCount','extraCosts','payTerms','giftText','deadlineText','legalText'];

function msg(texto, ok){
  const m = document.getElementById('importMsg');
  m.textContent = texto;
  m.style.color = ok ? '#0FA968' : '#E23B3B';
  setTimeout(()=>{ m.textContent=''; }, 4000);
}

function cargarDatos(data){
  CAMPOS.forEach(k=>{
    if(data[k]===undefined || data[k]===null) return;
    const el = document.getElementById(k);
    if(!el) return;
    el.value = Array.isArray(data[k]) ? data[k].join('\n') : data[k];
  });

  if(Array.isArray(data.dias) && data.dias.length){
    days = data.dias.map((d,i)=>({
      dayNumber:   d.dayNumber || i+1,
      dateLabel:   d.dateLabel || '',
      category:    d.category  || '',
      title:       d.title     || '',
      subtitle:    d.subtitle  || '',
      img:         d.img       || '',
      includes:    Array.isArray(d.includes) ? d.includes.join('\n') : (d.includes||''),
      notIncludes: d.notIncludes || '',
      tip:         d.tip       || '',
      price:       Number(d.price)||0,
      priceLabel:  d.priceLabel || d.title || ''
    }));
    renumerar();
  }
  renderForm();
  render();
}

function importarJSON(){
  const raw = document.getElementById('importJson').value.trim();
  if(!raw){ msg('Pega el JSON primero.', false); return; }
  try{
    cargarDatos(JSON.parse(raw));
    document.getElementById('importJson').value = '';
    msg('Datos cargados correctamente.', true);
  }catch(e){ msg('JSON inválido: ' + e.message, false); }
}

function exportarJSON(){
  const data = {};
  CAMPOS.forEach(k=>{ const el=document.getElementById(k); if(el) data[k]=el.value; });
  data.dias = days;
  const txt = JSON.stringify(data, null, 2);
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt)
      .then(()=>msg('JSON copiado al portapapeles.', true))
      .catch(()=>{ document.getElementById('importJson').value = txt; msg('Cópialo del recuadro.', true); });
  } else {
    document.getElementById('importJson').value = txt;
    msg('Cópialo del recuadro.', true);
  }
}

/* Precarga por URL:  ...index.html#d=<base64 del JSON> */
(function(){
  const m = location.hash.match(/[#&]d=([^&]+)/);
  if(!m) return;
  try{
    const json = decodeURIComponent(escape(atob(decodeURIComponent(m[1]))));
    cargarDatos(JSON.parse(json));
  }catch(e){ console.error('Hash inválido:', e); }
})();

/* wire generic inputs to re-render */
document.querySelectorAll('.form-panel input, .form-panel textarea').forEach(el=>{
  if(!el.closest('#daysContainer') && el.id!=='importJson') el.addEventListener('input', render);
});

renderForm();
render();
</script>
